name: build-windows-amd64

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Path to the Windows AMD64 kernel manifest JSON
        required: true
        default: manifests/current-windows-amd64.json
      packaging_ref:
        description: Optional override for the Windows packaging repo git ref
        required: false
        default: ""
      dry_run:
        description: If true, stop after preparing the Windows build context
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      ninja_jobs:
        description: Ninja job count passed to build.py
        required: false
        default: "2"
      runs_on_json:
        description: JSON array/string for runs-on. Use a larger Windows runner when available.
        required: false
        default: '["windows-2022"]'
      build_timeout_hours:
        description: build.py ninja timeout override in hours
        required: false
        default: "10.5"

concurrency:
  group: build-windows-amd64-${{ github.ref }}-${{ inputs.manifest_path }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runs_on_json) }}
    timeout-minutes: 720
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Long Paths
        run: |
          git config --system core.longpaths true
          git config --global core.longpaths true
          New-Item -ItemType Directory -Force -Path C:\tmp | Out-Null
          "TMP=C:\tmp" >> $env:GITHUB_ENV
          "TEMP=C:\tmp" >> $env:GITHUB_ENV
          $shortRoot = "D:\fk"
          if (Test-Path $shortRoot) {
            Remove-Item $shortRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $shortRoot | Out-Null
          robocopy "$env:GITHUB_WORKSPACE" "$shortRoot" /MIR /XD .git work artifacts logs /NFL /NDL /NJH /NJS /NP
          if ($LASTEXITCODE -gt 7) {
            exit $LASTEXITCODE
          }
          $global:LASTEXITCODE = 0
          "FK_BUILD_REPO_ROOT=$shortRoot" >> $env:GITHUB_ENV
          try {
            Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name LongPathsEnabled -Value 1 -Type DWord
          } catch {
            Write-Host "[WARN] LongPathsEnabled registry update failed: $_"
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Scripts
        run: |
          Set-Location "$env:FK_BUILD_REPO_ROOT"
          $files = Get-ChildItem scripts -Filter *.py | ForEach-Object { $_.FullName }
          python -m py_compile @files

      - name: Show Upgrade Plan
        run: |
          Set-Location "$env:FK_BUILD_REPO_ROOT"
          python scripts/render_upgrade_plan.py --manifest "${{ inputs.manifest_path }}"

      - name: Check Runner Prerequisites
        run: |
          Set-Location "$env:FK_BUILD_REPO_ROOT"
          foreach ($bin in @("git", "python", "7z")) {
            $cmd = Get-Command $bin -ErrorAction Stop
            Write-Host "[OK] found $bin -> $($cmd.Source)"
          }
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere"
          }
          Write-Host "[OK] found vswhere -> $vswhere"

      - name: Prepare Build Context
        run: |
          Set-Location "$env:FK_BUILD_REPO_ROOT"
          $args = @("--manifest", "${{ inputs.manifest_path }}", "--repo-root", "$env:FK_BUILD_REPO_ROOT")
          if ("${{ inputs.packaging_ref }}" -ne "") {
            $args += @("--packaging-ref", "${{ inputs.packaging_ref }}")
          }
          python scripts/prepare_build_context.py @args

      - name: Show Prepared Repo Status
        run: |
          Set-Location "$env:FK_BUILD_REPO_ROOT"
          git -C "$env:FK_PACKAGING_REPO_DIR" status --short
          Get-Content "$env:FK_LOGS_DIR\prepare-build-context.json" -Tail 120

      - name: Build And Package Windows AMD64
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          Set-Location "$env:FK_BUILD_REPO_ROOT"
          Set-Location "$env:FK_PACKAGING_REPO_DIR"
          $buildPy = Join-Path "$env:FK_PACKAGING_REPO_DIR" "build.py"
          $timeoutHours = "${{ inputs.build_timeout_hours }}"
          $text = Get-Content $buildPy -Raw
          $old = "timeout=3.5*60*60"
          $new = "timeout=$timeoutHours*60*60"
          if ($text.Contains($old)) {
            $text = $text.Replace($old, $new)
            Set-Content -Path $buildPy -Value $text -NoNewline
            Write-Host "[OK] patched build.py timeout to $timeoutHours hours"
          } elseif ($text.Contains($new)) {
            Write-Host "[OK] build.py timeout already patched to $timeoutHours hours"
          } else {
            throw "Could not find build.py timeout marker: $old"
          }
          python -m pip install httplib2==0.22.0
          $env:PYTHONUNBUFFERED = "1"
          $logFile = Join-Path "$env:FK_LOGS_DIR" "build.log"
          $errFile = Join-Path "$env:FK_LOGS_DIR" "build.err.log"
          $buildArgs = @("build.py", "--ci", "-j", "${{ inputs.ninja_jobs }}")
          Write-Host "[OK] launching build: python $($buildArgs -join ' ')"
          $proc = Start-Process -FilePath "python" `
            -ArgumentList $buildArgs `
            -NoNewWindow `
            -PassThru `
            -RedirectStandardOutput $logFile `
            -RedirectStandardError $errFile

          while (-not $proc.HasExited) {
            Start-Sleep -Seconds 300
            $proc.Refresh()
            $elapsed = [DateTime]::UtcNow - $proc.StartTime.ToUniversalTime()
            Write-Host "[heartbeat] Windows build still running pid=$($proc.Id) elapsed=$([int]$elapsed.TotalMinutes)m utc=$([DateTime]::UtcNow.ToString('o'))"
            foreach ($file in @($logFile, $errFile)) {
              if (Test-Path $file) {
                $info = Get-Item $file
                Write-Host "[heartbeat] tail $($info.Name) size=$($info.Length)"
                Get-Content $file -Tail 40 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
              }
            }
          }

          foreach ($file in @($logFile, $errFile)) {
            if (Test-Path $file) {
              $info = Get-Item $file
              Write-Host "[final-log] tail $($info.Name) size=$($info.Length)"
              Get-Content $file -Tail 120 -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
            }
          }
          if ($proc.ExitCode -ne 0) {
            throw "Windows build failed with exit code $($proc.ExitCode)"
          }

      - name: Smoke Check Windows AMD64 Artifacts
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          Set-Location "$env:FK_BUILD_REPO_ROOT"
          python scripts/run_windows_smoke_checks.py `
            --build-dir "$env:FK_PACKAGING_REPO_DIR\build" `
            --target-arch x64

      - name: Collect Build Outputs
        if: always()
        run: |
          Set-Location "$env:FK_BUILD_REPO_ROOT"
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\last-run"
          $logDir = Join-Path $env:GITHUB_WORKSPACE "logs\last-run"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          if ($env:FK_LOGS_DIR -and (Test-Path $env:FK_LOGS_DIR)) {
            Copy-Item "$env:FK_LOGS_DIR\*" $logDir -Recurse -Force -ErrorAction SilentlyContinue
          }
          if ($env:FK_PACKAGING_REPO_DIR) {
            $buildDir = Join-Path $env:FK_PACKAGING_REPO_DIR "build"
            if (Test-Path $buildDir) {
              Get-ChildItem $buildDir -File -Filter "ungoogled-chromium*" |
                Copy-Item -Destination $artifactDir -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Upload Run Outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-windows-amd64-${{ github.run_id }}
          path: |
            artifacts/last-run/
            logs/last-run/
            ${{ inputs.manifest_path }}
