name: build-mac-arm64

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Path to the kernel manifest JSON
        required: true
        default: manifests/current.json
      packaging_ref:
        description: Optional override for the packaging repo git ref
        required: false
        default: ""
      dry_run:
        description: If true, stop after preparing the build context
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      ninja_jobs:
        description: Optional ninja -j value. Lower this if the runner kills clang with code 137.
        required: false
        default: "6"

concurrency:
  group: build-mac-arm64-${{ github.ref }}-${{ inputs.manifest_path }}
  cancel-in-progress: false

jobs:
  build:
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python Venv
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_BOOTSTRAP="/opt/homebrew/bin/python3"
          if [ ! -x "$PYTHON_BOOTSTRAP" ]; then
            PYTHON_BOOTSTRAP="$(command -v python3)"
          fi
          "$PYTHON_BOOTSTRAP" -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "FK_PYTHON=$PWD/.venv/bin/python" >> "$GITHUB_ENV"
          ./.venv/bin/python --version

      - name: Install Python Build Dependencies
        run: |
          "$FK_PYTHON" -m pip install PySocks httplib2

      - name: Ensure Brew Build Dependencies
        shell: bash
        run: |
          set -euo pipefail
          export HOMEBREW_NO_AUTO_UPDATE=1
          for pkg in coreutils ninja readline; do
            if brew list "$pkg" >/dev/null 2>&1; then
              echo "[OK] brew package present: $pkg"
            else
              brew install "$pkg"
            fi
          done

      - name: Compile Scripts
        run: |
          "$FK_PYTHON" -m py_compile scripts/*.py

      - name: Show Upgrade Plan
        run: |
          "$FK_PYTHON" scripts/render_upgrade_plan.py --manifest "${{ inputs.manifest_path }}"

      - name: Check Runner Prerequisites
        shell: bash
        run: |
          set -euo pipefail
          for bin in git python3 greadlink ninja node xcodebuild; do
            command -v "$bin" >/dev/null
            echo "[OK] found $bin -> $(command -v "$bin")"
          done

      - name: Prepare Build Context
        shell: bash
        run: |
          set -euo pipefail
          args=(--manifest "${{ inputs.manifest_path }}" --repo-root "$PWD")
          if [ -n "${{ inputs.packaging_ref }}" ]; then
            args+=(--packaging-ref "${{ inputs.packaging_ref }}")
          fi
          "$FK_PYTHON" scripts/prepare_build_context.py "${args[@]}"

      - name: Show Prepared Repo Status
        shell: bash
        run: |
          set -euo pipefail
          git -C "$FK_PACKAGING_REPO_DIR" status --short || true

      - name: Build Chromium.app
        if: ${{ inputs.dry_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$FK_PACKAGING_REPO_DIR"
          FK_BUILD_HOME="$PWD/.fk-build-home"
          mkdir -p "$FK_BUILD_HOME/.cargo"
          cat > "$FK_BUILD_HOME/.cargo/config.toml" <<'EOF'
          [registries.crates-io]
          protocol = "sparse"

          [source.crates-io]
          registry = "sparse+https://index.crates.io/"

          [net]
          git-fetch-with-cli = true
          EOF
          export HOME="$FK_BUILD_HOME"
          export FK_NINJA_JOBS="${{ inputs.ninja_jobs }}"
          echo "[OK] isolated HOME: $HOME"
          echo "[OK] cargo config: $HOME/.cargo/config.toml"
          echo "[OK] FK_NINJA_JOBS: $FK_NINJA_JOBS"

          FK_LOCAL_CARGO_HOME="$FK_PACKAGING_REPO_DIR/build/src/third_party/rust-src/cargo-home"
          (
            i=0
            while [ ! -d "$FK_LOCAL_CARGO_HOME" ] && [ "$i" -lt 1800 ]; do
              i=$((i + 1))
              sleep 2
            done

            if [ -d "$FK_LOCAL_CARGO_HOME" ]; then
              {
                echo "[registries.crates-io]"
                echo 'protocol = "sparse"'
                echo
                echo "[source.crates-io]"
                echo 'registry = "sparse+https://index.crates.io/"'
                echo
                echo "[net]"
                echo "git-fetch-with-cli = true"
              } > "$FK_LOCAL_CARGO_HOME/config.toml"
              echo "[OK] wrote local cargo override: $FK_LOCAL_CARGO_HOME/config.toml"
            else
              echo "[WARN] rust cargo-home did not appear before timeout"
            fi
          ) &
          FK_CARGO_HELPER_PID=$!
          trap 'kill "$FK_CARGO_HELPER_PID" >/dev/null 2>&1 || true' EXIT

          ./build.sh arm64 2>&1 | tee "$FK_LOGS_DIR/build.log"
          wait "$FK_CARGO_HELPER_PID" || true

      - name: Smoke Check Built App
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          "$FK_PYTHON" scripts/run_smoke_checks.py \
            --app "$FK_PACKAGING_REPO_DIR/build/src/out/Default/Chromium.app"

      - name: Collect Build Outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/last-run logs/last-run
          if [ -n "${FK_LOGS_DIR:-}" ] && [ -d "$FK_LOGS_DIR" ]; then
            rsync -a "$FK_LOGS_DIR"/ logs/last-run/ || true
          fi
          if [ -n "${FK_PACKAGING_REPO_DIR:-}" ] && [ -d "$FK_PACKAGING_REPO_DIR/build" ]; then
            find "$FK_PACKAGING_REPO_DIR/build" -maxdepth 1 \( -name '*.dmg' -o -name '*.zip' \) -exec cp {} artifacts/last-run/ \; || true
          fi

      - name: Upload Run Outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-mac-arm64-${{ github.run_id }}
          path: |
            artifacts/last-run/
            logs/last-run/
            manifests/current.json
